version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-agent-builder-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiagent123}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_builder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agent-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: ai-agent-builder-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agent-network

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai-agent-builder-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-aiagent}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-aiagent123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ai-agent-network

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-agent-builder-backend
    environment:
      - DATABASE_URL=postgresql://aiagent:aiagent123@postgres:5432/ai_agent_builder
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://aiagent:aiagent123@rabbitmq:5672
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-agent-network
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-agent-builder-celery-worker
    environment:
      - DATABASE_URL=postgresql://aiagent:aiagent123@postgres:5432/ai_agent_builder
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://aiagent:aiagent123@rabbitmq:5672
      - CELERY_BROKER_URL=amqp://aiagent:aiagent123@rabbitmq:5672
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ai-agent-network
    command: celery -A app.core.celery_app worker --loglevel=info

  # Celery Beat (定时任务)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-agent-builder-celery-beat
    environment:
      - DATABASE_URL=postgresql://aiagent:aiagent123@postgres:5432/ai_agent_builder
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://aiagent:aiagent123@rabbitmq:5672
      - CELERY_BROKER_URL=amqp://aiagent:aiagent123@rabbitmq:5672
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ai-agent-network
    command: celery -A app.core.celery_app beat --loglevel=info

  # Flower监控
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-agent-builder-flower
    environment:
      - CELERY_BROKER_URL=amqp://aiagent:aiagent123@rabbitmq:5672
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
      - celery-worker
    networks:
      - ai-agent-network
    command: celery -A app.core.celery_app flower --port=5555

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-agent-builder-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_NAME=AI Agent Builder Lite
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ai-agent-network
    command: npm run dev

  # Nginx反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: ai-agent-builder-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - ai-agent-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-agent-builder-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ai-agent-network

  # Grafana仪表板
  grafana:
    image: grafana/grafana:latest
    container_name: ai-agent-builder-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ai-agent-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  ai-agent-network:
    driver: bridge